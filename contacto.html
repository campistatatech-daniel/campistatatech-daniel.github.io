<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Formulario de Contacto</title>
  <link rel="stylesheet" href="contacto.css">
</head>
<body>

    <nav>
        <ul>
            <li><a href="index.html">Inicio</a></li>
            <li><a href="productos.html">Productos</a></li>
            <li><a href="nosotros.html">Nosotros</a></li>
        
        </ul>
    </nav>

    <div class="form-container">
        <!-- Logo de la empresa -->
        <img src="saludconecta logo.jpg" alt="Logo de la empresa" class="logo">
        

    <div class="form-container">
        <h2>Formulario de Contacto</h2>
    
        <form action="#" method="post">
          <label for="nombre">Nombre:</label>
          <input type="text" id="nombre" name="nombre" required>
    
          <label for="ocupacion">Ocupación:</label>
          <input type="text" id="ocupacion" name="ocupacion" required>
    
          <label for="correo">Correo electrónico:</label>
          <input type="email" id="correo" name="correo" required>
    
          <label for="sexo">Sexo:</label>
          <select id="sexo" name="sexo" required>
            <option value="">Seleccione una opción</option>
            <option value="masculino">Masculino</option>
            <option value="femenino">Femenino</option>
            <option value="otro">Otro</option>
          </select>
    
          <label for="celular">Número de celular:</label>
          <input type="tel" id="celular" name="celular" pattern="[0-9]{10}" required>
          <small>Formato: 10 dígitos (ej: 3001234567)</small>
    
          <button type="submit">Enviar</button>
        </form>
      </div>
      <footer>
        <p>&copy; 2025 Salud Conecta. Todos los derechos reservados.</p>
    </footer>
</body>
</html>
